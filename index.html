<!doctype html>
<html lang="en">
  <head>
    <title>HexGL</title>
    <meta charset="utf-8">
    <meta name="description" content="HexGL is a futuristic HTML5 / WebGL racing game.">
    <meta property="og:title" content="HexGL" />
    <meta property="og:type" content="game" />
    <meta property="og:site_name" content="HexGL" />
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/multi.css?v=__VERSION__" type="text/css" charset="utf-8">
    <link rel="stylesheet" href="css/fonts.css?v=__VERSION__" type="text/css" charset="utf-8">
    <style>
      body {
        padding:0;
        margin:0;
      }
      canvas { pointer-events:none; width: 100%;}
      #overlay{
        position: absolute;
        z-index: 9999;
        top: 0;
        left: 0;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div id="step-1">
      <div id="global"></div>
      <div id="title"></div>
      <div id="menucontainer">
        <div id="menu">
          <div id="start">Start</div>
          <div id="s-controlType">Controls: Keyboard</div>
          <div id="s-quality">Quality: High</div>
          <div id="s-hud">HUD: On</div>
          <div id="s-godmode" style="display: none">Godmode: Off</div>
        </div>
      </div>
    </div>
    <div id="step-2" style="display: none">
      <div id="ctrl-help">Click/Touch to continue.</div>
    </div>
    <div id="step-3" style="display: none">
      <div id="progressbar"></div>
    </div>
    <div id="step-4" style="display: none">
      <div id="overlay"></div>
      <div id="main"></div>
    </div>
    <div id="step-5" style="display: none">
      <div id="time"></div>
      <div id="ctrl-help">Click/Touch to continue.</div>
    </div>
    <div id="leapinfo" style="display: none"></div>

    <script src="libs/leap-0.4.1.min.js?v=__VERSION__"></script>
    <script src="libs/Three.dev.js?v=__VERSION__"></script>
    <script src="libs/ShaderExtras.js?v=__VERSION__"></script>
    <script src="libs/postprocessing/EffectComposer.js?v=__VERSION__"></script>
    <script src="libs/postprocessing/RenderPass.js?v=__VERSION__"></script>
    <script src="libs/postprocessing/BloomPass.js?v=__VERSION__"></script>
    <script src="libs/postprocessing/ShaderPass.js?v=__VERSION__"></script>
    <script src="libs/postprocessing/MaskPass.js?v=__VERSION__"></script>
    <script src="libs/Detector.js?v=__VERSION__"></script>
    <script src="libs/Stats.js?v=__VERSION__"></script>
    <script src="libs/DAT.GUI.min.js?v=__VERSION__"></script>

    <script src="bkcore.coffee/controllers/TouchController.js?v=__VERSION__"></script>
    <script src="bkcore.coffee/controllers/OrientationController.js?v=__VERSION__"></script>
    <script src="bkcore.coffee/controllers/GamepadController.js?v=__VERSION__"></script>

    <script src="bkcore.coffee/Timer.js?v=__VERSION__"></script>
    <script src="bkcore.coffee/ImageData.js?v=__VERSION__"></script>
    <script src="bkcore.coffee/Utils.js?v=__VERSION__"></script>

    <script src="bkcore/threejs/RenderManager.js?v=__VERSION__"></script>
    <script src="bkcore/threejs/Shaders.js?v=__VERSION__"></script>
    <script src="bkcore/threejs/Particles.js?v=__VERSION__"></script>
    <script src="bkcore/threejs/Loader.js?v=__VERSION__"></script>

    <script src="bkcore/Audio.js?v=__VERSION__"></script>

    <script src="bkcore/hexgl/HUD.js?v=__VERSION__"></script>
    <script src="bkcore/hexgl/RaceData.js?v=__VERSION__"></script>
    <script src="bkcore/hexgl/ShipControls.js?v=__VERSION__"></script>
    <script src="bkcore/hexgl/ShipEffects.js?v=__VERSION__"></script>
    <script src="bkcore/hexgl/CameraChase.js?v=__VERSION__"></script>
    <script src="bkcore/hexgl/Gameplay.js?v=__VERSION__"></script>

    <script src="bkcore/hexgl/tracks/Cityscape.js?v=__VERSION__"></script>

    <script src="bkcore/hexgl/HexGL.js?v=__VERSION__"></script>

    <script src="launch.js?v=__VERSION__"></script>

  </body>
</html>
